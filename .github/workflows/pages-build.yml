name: Daily GitHub Pages Rebuild

on:
  schedule:
    - cron: "1 0 * * *"   # каждый день в 00:01
  workflow_dispatch:       # возможность запустить вручную

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"

      - name: Install Jekyll
        run: |
          gem install bundler
          gem install jekyll

      - name: Build site with future posts enabled
        run: |
          jekyll build --future

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

